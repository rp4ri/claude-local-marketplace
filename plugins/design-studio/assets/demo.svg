      <line x1="0" y1="290" x2="820" y2="290"/>
      <line x1="0" y1="435" x2="820" y2="435"/>
      <line x1="205" y1="0" x2="205" y2="580"/>
      <line x1="410" y1="0" x2="410" y2="580"/>
      <line x1="615" y1="0" x2="615" y2="580"/>
