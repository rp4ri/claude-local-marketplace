<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 394" width="820" height="394">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="820" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0D9668"/>
    </linearGradient>
    <clipPath id="outer-clip">
      <rect x="0" y="0" width="820" height="394" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#outer-clip)">

    <!-- Background -->
    <rect width="820" height="394" fill="url(#bg2)"/>

    <!-- Subtle grid -->
    <g opacity="0.04" stroke="#fff" stroke-width="1">
      <line x1="0" y1="197" x2="820" y2="197"/>
      <line x1="205" y1="0" x2="205" y2="394"/>
      <line x1="410" y1="0" x2="410" y2="394"/>
      <line x1="615" y1="0" x2="615" y2="394"/>
    </g>

    <!-- Top accent bar -->
    <rect width="820" height="5" fill="url(#accent2)"/>

    <!-- Header label -->
    <text x="40" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="2">COMMAND EXAMPLES</text>
    <line x1="40" y1="46" x2="780" y2="46" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>


    <!-- ─── ROW 1 ─────────────────────────────────────────── -->

    <!-- Card 1: /design-review (x=40, y=58, w=360, h=144) -->
    <rect x="40" y="58" width="360" height="144" rx="10" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Left accent edge -->
    <rect x="40" y="58" width="3" height="144" rx="2" fill="#6366f1" fill-opacity="0.6"/>
    <!-- Command -->
    <text x="62" y="90" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6366f1">$</text>
    <text x="80" y="90" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#f8fafc">/design-review ./src/checkout.html</text>
    <!-- Output lines -->
    <text x="62" y="118" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="82" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">5-point audit: Accessibility &#183; Usability &#183; Visual</text>
    <text x="62" y="140" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="82" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">WCAG AA contrast, semantic HTML, focus gaps</text>
    <!-- Tag -->
    <text x="62" y="182" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#334155">accessibility &#183; audit</text>

    <!-- Card 2: /brand-kit (x=420, y=58, w=360, h=144) -->
    <rect x="420" y="58" width="360" height="144" rx="10" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Left accent edge -->
    <rect x="420" y="58" width="3" height="144" rx="2" fill="#0D9668" fill-opacity="0.6"/>
    <!-- Command -->
    <text x="442" y="90" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6366f1">$</text>
    <text x="460" y="90" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#f8fafc">/brand-kit #6366f1 premium</text>
    <!-- Output lines -->
    <text x="442" y="118" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="462" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">10-shade palette, type scale, spacing tokens</text>
    <text x="442" y="140" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="462" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">CSS vars + Tailwind config + JSON output</text>
    <!-- Tag -->
    <text x="442" y="182" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#334155">branding &#183; tokens</text>


    <!-- ─── ROW 2 ─────────────────────────────────────────── -->

    <!-- Card 3: /figma-create (x=40, y=218, w=360, h=144) -->
    <rect x="40" y="218" width="360" height="144" rx="10" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Left accent edge -->
    <rect x="40" y="218" width="3" height="144" rx="2" fill="#6366f1" fill-opacity="0.6"/>
    <!-- Command -->
    <text x="62" y="250" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6366f1">$</text>
    <text x="80" y="250" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#f8fafc">/figma-create 3-screen wireframe</text>
    <!-- Output lines -->
    <text x="62" y="278" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="82" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Creates frames via Desktop Bridge (Figma open)</text>
    <text x="62" y="300" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="82" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Auto-layout structure, annotations, content</text>
    <!-- Tag -->
    <text x="62" y="342" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#334155">figma &#183; desktop bridge</text>

    <!-- Card 4: /design-sprint (x=420, y=218, w=360, h=144) -->
    <rect x="420" y="218" width="360" height="144" rx="10" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Left accent edge -->
    <rect x="420" y="218" width="3" height="144" rx="2" fill="#0D9668" fill-opacity="0.6"/>
    <!-- Command -->
    <text x="442" y="250" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6366f1">$</text>
    <text x="460" y="250" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#f8fafc">/design-sprint Improve signup conversion</text>
    <!-- Output lines -->
    <text x="442" y="278" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="462" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">5 phases: Understand &#8594; Decide &#8594; Prototype &#8594; Validate</text>
    <text x="442" y="300" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#0D9668">&#8594;</text>
    <text x="462" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Problem map, 8 ideas, matrix, test script</text>
    <!-- Tag -->
    <text x="442" y="342" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#334155">strategy &#183; workshop</text>

  </g>
</svg>
