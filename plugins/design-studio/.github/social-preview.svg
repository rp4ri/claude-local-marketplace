<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Icon cluster (design tools) -->
  <g transform="translate(640, 200)" opacity="0.15">
    <circle cx="-200" cy="0" r="60" fill="#3b82f6"/>
    <circle cx="0" cy="-40" r="80" fill="#8b5cf6"/>
    <circle cx="200" cy="0" r="60" fill="#06b6d4"/>
    <circle cx="-100" cy="60" r="50" fill="#f59e0b"/>
    <circle cx="100" cy="60" r="50" fill="#10b981"/>
  </g>

  <!-- Plugin badge -->
  <rect x="520" y="120" width="240" height="36" rx="18" fill="url(#accent)" opacity="0.9"/>
  <text x="640" y="143" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" letter-spacing="1.5">CLAUDE CODE PLUGIN</text>

  <!-- Title -->
  <text x="640" y="240" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-1">Design Studio</text>

  <!-- Subtitle -->
  <text x="640" y="300" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400">A virtual design team for Claude Code</text>

  <!-- Divider -->
  <rect x="540" y="330" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Role icons row -->
  <g transform="translate(640, 400)">
    <!-- Product Designer -->
    <g transform="translate(-280, 0)">
      <circle r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#3b82f6" font-size="24">P</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Product</text>
    </g>
    <!-- UX Designer -->
    <g transform="translate(-187, 0)">
      <circle r="28" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#8b5cf6" font-size="24">UX</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">UX</text>
    </g>
    <!-- UI Designer -->
    <g transform="translate(-93, 0)">
      <circle r="28" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#06b6d4" font-size="24">UI</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">UI</text>
    </g>
    <!-- Content -->
    <g transform="translate(0, 0)">
      <circle r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#f59e0b" font-size="24">C</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Content</text>
    </g>
    <!-- Research -->
    <g transform="translate(93, 0)">
      <circle r="28" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#10b981" font-size="24">R</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Research</text>
    </g>
    <!-- System -->
    <g transform="translate(187, 0)">
      <circle r="28" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#f43f5e" font-size="24">S</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">System</text>
    </g>
    <!-- Motion -->
    <g transform="translate(280, 0)">
      <circle r="28" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
      <text y="6" text-anchor="middle" fill="#a855f7" font-size="24">M</text>
      <text y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Motion</text>
    </g>
  </g>

  <!-- Footer commands -->
  <g transform="translate(640, 560)">
    <text text-anchor="middle" fill="#475569" font-family="ui-monospace, monospace" font-size="16">/design  /design-review  /design-system  /figma</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)"/>
</svg>
